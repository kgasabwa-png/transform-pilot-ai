<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Nyvlo</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      width: 340px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
      font-size: 13px;
      color: #111;
      background: #fafaf8;
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; border-bottom: 1px solid #e8e6e0;
      background: #fff;
    }
    .brand { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 14px; }
    .mark { width: 18px; height: 18px; border-radius: 5px; background: #111; display: grid; place-items: center; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #f59e0b; }
    .link { color: #6b6b6b; text-decoration: none; font-size: 11.5px; }
    .link:hover { color: #111; }
    main { padding: 12px 14px; }
    .stat {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 10px 12px; background: #fff; border: 1px solid #e8e6e0; border-radius: 8px;
      margin-bottom: 10px;
    }
    .stat-label { font-size: 11px; color: #6b6b6b; text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-value { font-size: 22px; font-weight: 600; }
    .stat-hint { font-size: 11px; color: #6b6b6b; }
    h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #6b6b6b; margin: 14px 0 6px; }
    .promise {
      padding: 8px 10px; background: #fff; border: 1px solid #e8e6e0; border-radius: 6px;
      margin-bottom: 6px;
    }
    .promise-title { font-size: 12.5px; line-height: 1.35; }
    .promise-meta { font-size: 11px; color: #6b6b6b; margin-top: 3px; }
    .empty { padding: 16px; text-align: center; color: #6b6b6b; font-size: 12px; }
    .overdue { color: #b91c1c; }
    button, .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 6px 10px; font-size: 12px; font-family: inherit;
      background: #111; color: #fff; border: none; border-radius: 6px; cursor: pointer;
      text-decoration: none;
    }
    button:hover, .btn:hover { opacity: 0.9; }
    .btn-ghost { background: transparent; color: #6b6b6b; border: 1px solid #e8e6e0; }
    .setup { padding: 16px 14px; }
    .setup input {
      width: 100%; padding: 8px 10px; border: 1px solid #e8e6e0; border-radius: 6px;
      font-family: inherit; font-size: 12px; margin: 8px 0;
    }
    .setup p { color: #6b6b6b; font-size: 12px; line-height: 1.4; margin: 0 0 10px; }
    .error { color: #b91c1c; font-size: 11.5px; margin-top: 6px; }
    footer {
      padding: 10px 14px; border-top: 1px solid #e8e6e0; background: #fff;
      display: flex; justify-content: space-between; align-items: center;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="popup.js"></script>
</body>
</html>
